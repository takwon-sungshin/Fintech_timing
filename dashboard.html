<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강의 대시보드 — 학생 점수 실시간</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2129;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --accent3: #f0883e;
  --accent4: #d2a8ff;
  --danger: #ff6b6b;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', 'Noto Sans KR', sans-serif;
  font-weight: 400;
  line-height: 1.5;
  min-height: 100vh;
  padding: 28px;
}
.container { max-width: 1300px; margin: 0 auto; }
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  gap: 20px;
  flex-wrap: wrap;
}
h1 { font-size: 30px; font-weight: 600; }
h1 span { color: var(--accent); }
.sub { color: var(--text-dim); font-size: 13px; margin-top: 4px; }
.live-dot {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent2);
  margin-right: 6px;
  animation: pulse 1.6s ease-in-out infinite;
  vertical-align: middle;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(0.85); }
}
.conn-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
}
.conn-status.offline .live-dot { background: var(--danger); animation: none; }

.controls {
  display: flex;
  gap: 12px;
  align-items: center;
}
button {
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  transition: background 0.15s, transform 0.05s;
}
button:hover:not(:disabled) { background: #252a31; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
button.danger {
  background: var(--danger);
  color: white;
  border-color: var(--danger);
  font-weight: 600;
}
button.danger:hover:not(:disabled) { background: #ff8585; }
button.ghost {
  background: transparent;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 18px;
}
@media (max-width: 980px) { .stats-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 540px) { .stats-grid { grid-template-columns: 1fr; } }

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.stat .bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.stat.you .bar { background: var(--accent3); }
.stat.count .bar { background: var(--accent); }
.stat.win .bar { background: var(--accent2); }
.stat.gap .bar { background: var(--accent4); }
.stat .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 8px;
  font-weight: 500;
}
.stat .value {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 44px;
  font-weight: 500;
  line-height: 1;
}
.stat.you .value { color: var(--accent3); }
.stat.count .value { color: var(--accent); }
.stat.win .value { color: var(--accent2); }
.stat.gap .value { color: var(--accent4); }
.stat .sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 8px;
}

.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
}
@media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.panel-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 14px;
  padding-left: 10px;
  border-left: 3px solid var(--accent);
}

canvas {
  width: 100% !important;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: block;
}

.feed { max-height: 380px; overflow-y: auto; }
.feed-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  margin-bottom: 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  animation: slideIn 0.4s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.feed-item .score { font-size: 18px; font-weight: 500; }
.feed-item .score.high { color: var(--accent2); }
.feed-item .score.mid { color: var(--accent3); }
.feed-item .score.low { color: var(--danger); }
.feed-item .time { color: var(--text-dim); font-size: 11px; }

.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
  font-size: 14px;
}

.compare-line {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 12px;
  justify-content: center;
}
.compare-line .swatch {
  display: inline-block;
  width: 14px; height: 3px;
  margin-right: 5px;
  vertical-align: middle;
  border-radius: 2px;
}

.footer-credit {
  margin-top: 28px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
}
</style>
</head>
<body>

<div class="container">

  <header>
    <div>
      <h1>강의 <span>대시보드</span></h1>
      <div class="sub">학생 점수 실시간 집계 · 강의 시작 전 "초기화" 누르고 QR 띄우세요</div>
    </div>
    <div class="controls">
      <div class="conn-status" id="connStatus"><span class="live-dot"></span><span id="connText">연결 중…</span></div>
      <button class="ghost" id="refreshBtn">새로고침</button>
      <button class="danger" id="resetBtn">초기화</button>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat count">
      <div class="bar"></div>
      <div class="label">점수 기록 수</div>
      <div class="value" id="statCount">—</div>
      <div class="sub" id="statCountSub">한 학생이 여러 판 플레이 가능</div>
    </div>
    <div class="stat you">
      <div class="bar"></div>
      <div class="label">학생 평균</div>
      <div class="value" id="statAvg">—</div>
      <div class="sub" id="statAvgSub">실시간 갱신</div>
    </div>
    <div class="stat win">
      <div class="bar"></div>
      <div class="label">수학 봇 이긴 비율</div>
      <div class="value" id="statWin">—</div>
      <div class="sub">≥ 89.4점 달성 비율</div>
    </div>
    <div class="stat gap">
      <div class="bar"></div>
      <div class="label">수학 봇과의 격차</div>
      <div class="value" id="statGap">—</div>
      <div class="sub">학생 평균 − 89.4</div>
    </div>
  </div>

  <div class="grid">
    <div class="panel">
      <div class="panel-title">점수 분포 (실시간 히스토그램)</div>
      <canvas id="histChart" height="280"></canvas>
      <div class="compare-line">
        <span><span class="swatch" style="background:var(--accent3);"></span>학생 점수</span>
        <span><span class="swatch" style="background:var(--accent);"></span>수학 봇 89.4</span>
        <span><span class="swatch" style="background:var(--text-dim);"></span>무작위 76.8</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">최근 점수 (최신순)</div>
      <div class="feed" id="feed">
        <div class="empty" id="emptyFeed">아직 들어온 점수가 없어요.<br>학생들이 게임 한 판 끝내면 여기에 뜹니다.</div>
      </div>
    </div>
  </div>

  <div class="footer-credit">
    성신여자대학교 수리통계데이터사이언스학부 · 핀테크 트랙 데모 · 강의 대시보드
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getDatabase, ref, onValue, remove, goOffline, goOnline
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA37yejwEmS357EpjfHIaBFGxr1EG5DLLg",
  authDomain: "sungshin-timing.firebaseapp.com",
  databaseURL: "https://sungshin-timing-default-rtdb.firebaseio.com",
  projectId: "sungshin-timing",
  storageBucket: "sungshin-timing.firebasestorage.app",
  messagingSenderId: "979579687379",
  appId: "1:979579687379:web:2dec0feade7d43dfd31f26"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const scoresRef = ref(db, 'scores');
const connRef = ref(db, '.info/connected');

const MATH_BOT = 89.4;
const RANDOM_BASE = 76.8;

let scores = []; // {score, ts}

const $ = (id) => document.getElementById(id);

function fmtTime(ts) {
  const d = new Date(ts);
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  const s = String(d.getSeconds()).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function scoreClass(s) {
  if (s >= MATH_BOT) return 'high';
  if (s >= RANDOM_BASE) return 'mid';
  return 'low';
}

function renderStats() {
  const n = scores.length;
  $('statCount').textContent = n;
  if (n === 0) {
    $('statAvg').textContent = '—';
    $('statWin').textContent = '—';
    $('statGap').textContent = '—';
    return;
  }
  const sum = scores.reduce((a, b) => a + b.score, 0);
  const avg = sum / n;
  const winCnt = scores.filter(s => s.score >= MATH_BOT).length;
  const winPct = winCnt / n * 100;
  const gap = avg - MATH_BOT;
  $('statAvg').textContent = avg.toFixed(1);
  $('statWin').textContent = winPct.toFixed(0) + '%';
  $('statGap').textContent = (gap >= 0 ? '+' : '') + gap.toFixed(1);
}

function renderFeed() {
  const feed = $('feed');
  if (scores.length === 0) {
    feed.innerHTML = '<div class="empty">아직 들어온 점수가 없어요.<br>학생들이 게임 한 판 끝내면 여기에 뜹니다.</div>';
    return;
  }
  // 최신순 (최대 20개)
  const recent = [...scores].sort((a, b) => b.ts - a.ts).slice(0, 20);
  feed.innerHTML = recent.map(s =>
    `<div class="feed-item">
       <span class="score ${scoreClass(s.score)}">${s.score.toFixed(1)}</span>
       <span class="time">${fmtTime(s.ts)}</span>
     </div>`
  ).join('');
}

function fixCanvas() {
  const c = $('histChart');
  const dpr = window.devicePixelRatio || 1;
  const rect = c.getBoundingClientRect();
  const cssW = rect.width;
  const cssH = 280;
  c.style.height = cssH + 'px';
  c.width = Math.max(400, Math.floor(cssW * dpr));
  c.height = Math.floor(cssH * dpr);
  c._dpr = dpr; c._cssW = cssW; c._cssH = cssH;
}

function drawHist() {
  const c = $('histChart');
  const ctx = c.getContext('2d');
  const dpr = c._dpr || 1;
  const W = c._cssW || c.width;
  const H = c._cssH || c.height;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  const padL = 50, padR = 20, padT = 20, padB = 36;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  // 점수는 0~100, 20개 빈
  const nBins = 20;
  const bins = new Array(nBins).fill(0);
  for (const s of scores) {
    let idx = Math.floor(s.score / 100 * nBins);
    if (idx >= nBins) idx = nBins - 1;
    if (idx < 0) idx = 0;
    bins[idx]++;
  }
  const maxBin = Math.max(1, ...bins);

  // grid
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = padT + plotH * (i / 4);
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(W - padR, y);
    ctx.stroke();
  }

  // y axis
  ctx.fillStyle = '#8b949e';
  ctx.font = '11px "IBM Plex Mono", monospace';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const v = Math.round(maxBin * (1 - i / 4));
    ctx.fillText(v, padL - 6, padT + plotH * (i / 4) + 4);
  }

  // x axis (0~100)
  ctx.textAlign = 'center';
  for (let v = 0; v <= 100; v += 20) {
    const x = padL + plotW * (v / 100);
    ctx.fillText(v, x, H - 14);
  }
  ctx.font = '11px "IBM Plex Sans", "Noto Sans KR", sans-serif';
  ctx.fillStyle = '#8b949e';
  ctx.fillText('학생 점수 (0 = 최저, 100 = 최고가에 정확히 매도)', padL + plotW / 2, H - 2);

  // bars
  for (let i = 0; i < nBins; i++) {
    if (bins[i] === 0) continue;
    const h = (bins[i] / maxBin) * plotH;
    const x = padL + plotW * (i / nBins);
    const w = plotW / nBins - 1.5;
    const y = padT + plotH - h;
    // 색상: 점수 구간별로 다르게
    const binCenter = (i + 0.5) / nBins * 100;
    let color;
    if (binCenter >= MATH_BOT) color = 'rgba(63, 185, 80, 0.75)';   // green
    else if (binCenter >= RANDOM_BASE) color = 'rgba(240, 136, 62, 0.75)'; // orange
    else color = 'rgba(255, 107, 107, 0.65)';                       // red
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
  }

  // reference lines: 89.4 (math bot) and 76.8 (random)
  function refLine(val, color, label, labelY) {
    const x = padL + plotW * (val / 100);
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(x, padT);
    ctx.lineTo(x, padT + plotH);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = color;
    ctx.font = '11px "IBM Plex Mono", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(label, x + 4, labelY);
  }
  refLine(MATH_BOT, '#58a6ff', '수학 89.4', padT + 14);
  refLine(RANDOM_BASE, '#8b949e', '랜덤 76.8', padT + 28);

  // 평균 라인 (학생 평균이 있으면)
  if (scores.length > 0) {
    const avg = scores.reduce((a, b) => a + b.score, 0) / scores.length;
    const x = padL + plotW * (avg / 100);
    ctx.strokeStyle = '#f0883e';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(x, padT);
    ctx.lineTo(x, padT + plotH);
    ctx.stroke();
    ctx.fillStyle = '#f0883e';
    ctx.font = 'bold 12px "IBM Plex Mono", monospace';
    ctx.textAlign = 'left';
    ctx.fillText('학생 평균 ' + avg.toFixed(1), x + 5, padT + 44);
  }
}

function rerender() {
  renderStats();
  renderFeed();
  drawHist();
}

// 실시간 listen
onValue(scoresRef, (snap) => {
  const data = snap.val() || {};
  scores = Object.values(data).filter(v =>
    v && typeof v.score === 'number' && typeof v.ts === 'number'
  );
  rerender();
});

// 연결 상태
onValue(connRef, (snap) => {
  const connected = snap.val() === true;
  const el = $('connStatus');
  const t = $('connText');
  if (connected) { el.classList.remove('offline'); t.textContent = 'Firebase 연결됨'; }
  else { el.classList.add('offline'); t.textContent = '오프라인'; }
});

// 버튼
$('resetBtn').addEventListener('click', () => {
  if (!confirm('모든 학생 점수를 삭제할까요? (강의 시작 전이면 OK)')) return;
  remove(scoresRef).then(() => { scores = []; rerender(); })
    .catch(e => alert('삭제 실패: ' + e.message));
});

$('refreshBtn').addEventListener('click', () => rerender());

// init
window.addEventListener('load', () => { fixCanvas(); drawHist(); });
window.addEventListener('resize', () => { fixCanvas(); drawHist(); });
</script>

<script data-goatcounter="https://takwon-sungshin.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
